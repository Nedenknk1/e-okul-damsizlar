<!DOCTYPE html>
<html>
<head>
    <title>Giriş</title>
</head>
<body>

<form method="POST">
    <h2>Giriş Yap</h2>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <input type="text" name="username" placeholder="Kullanıcı Adı" required autofocus><br>
    <input type="password" name="password" placeholder="Şifre" required><br>
    <button type="submit">Giriş</button>
</form>

</body>
</html>
